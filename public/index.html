<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GradeView" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="/manifest.json" />
  <title>GradeView</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --muted: rgba(240,240,240,0.35);
      --accent: #e8ff6e;
      --red: #ff5c5c;
      --orange: #ffaa5c;
      --green: #5cffa0;
      --blue: #5cb8ff;
      --safe: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow-x: hidden; }

    .screen { position: fixed; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.35s ease, transform 0.35s ease; transform: translateY(16px); }
    .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); }

    #loginScreen { justify-content: center; align-items: center; padding: 40px 28px; }
    .login-logo { font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 52px; text-align: center; }
    .login-logo span { color: var(--accent); }
    .login-title { font-size: 36px; font-weight: 800; line-height: 1.1; margin-bottom: 8px; text-align: center; }
    .login-sub { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 44px; }
    .field-group { width: 100%; max-width: 340px; margin-bottom: 14px; }
    .field-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 8px; display: block; }
    .field-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px 18px; color: var(--text); font-size: 16px; font-family: 'Syne', sans-serif; outline: none; transition: border-color 0.2s; }
    .field-input:focus { border-color: rgba(232,255,110,0.4); }
    .field-input::placeholder { color: var(--muted); }
    .district-row { display: flex; align-items: center; }
    .district-prefix { background: var(--surface2); border: 1px solid var(--border); border-right: none; border-radius: 12px 0 0 12px; padding: 15px 14px; font-size: 14px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }
    .district-input { border-radius: 0 12px 12px 0 !important; }
    .btn-login { width: 100%; max-width: 340px; margin-top: 24px; padding: 17px; background: var(--accent); color: #0a0a0a; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
    .btn-login:active { transform: scale(0.97); opacity: 0.85; }
    .error-msg { margin-top: 16px; font-size: 13px; color: var(--red); font-family: 'DM Mono', monospace; text-align: center; min-height: 18px; }

    #loadingScreen { justify-content: center; align-items: center; gap: 20px; }
    .loader-ring { width: 48px; height: 48px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.1em; }

    #gradesScreen { background: var(--bg); }
    .top-bar { padding: 56px 24px 0; flex-shrink: 0; }
    .top-bar-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .greeting { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.1em; margin-bottom: 4px; }
    .top-title { font-size: 28px; font-weight: 800; line-height: 1.1; }
    .logout-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; }
    .refresh-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; transition: color 0.2s, transform 0.3s; }
    .refresh-btn:active { color: var(--accent); transform: rotate(180deg); }

    .gpa-card { margin: 20px 24px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px 22px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .gpa-number { font-size: 48px; font-weight: 800; color: var(--accent); line-height: 1; font-variant-numeric: tabular-nums; }
    .gpa-info { flex: 1; }
    .gpa-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
    .gpa-sub { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .gpa-bar-wrap { margin-top: 12px; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .gpa-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 1s cubic-bezier(0.4,0,0.2,1); width: 0%; }

    .section-label { padding: 20px 24px 10px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; flex-shrink: 0; }
    .courses-scroll { flex: 1; overflow-y: auto; padding: 0 24px; padding-bottom: calc(24px + var(--safe)); -webkit-overflow-scrolling: touch; }
    .courses-scroll::-webkit-scrollbar { display: none; }

    .course-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 16px; opacity: 0; transform: translateY(12px); animation: slideUp 0.4s ease forwards; }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    .grade-badge { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; font-family: 'DM Mono', monospace; }
    .grade-A { background: rgba(92,255,160,0.12); color: var(--green); }
    .grade-B { background: rgba(92,184,255,0.12); color: var(--blue); }
    .grade-C { background: rgba(255,170,92,0.12); color: var(--orange); }
    .grade-D { background: rgba(255,92,92,0.1); color: var(--red); }
    .grade-F { background: rgba(255,92,92,0.15); color: var(--red); }
    .grade-NA { background: var(--surface2); color: var(--muted); }
    .course-info { flex: 1; min-width: 0; }
    .course-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .course-teacher { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .course-pct { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--muted); flex-shrink: 0; }
    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 16px; }
    .empty-text { font-size: 14px; font-family: 'DM Mono', monospace; line-height: 1.6; }
  </style>
</head>
<body>

<div class="screen active" id="loginScreen">
  <div class="login-logo">GRADE<span>VIEW</span></div>
  <h1 class="login-title">Your grades,<br/>simplified.</h1>
  <p class="login-sub">Sign in with your Aspen credentials</p>
  <div class="field-group">
    <label class="field-label">District</label>
    <div class="district-row">
      <span class="district-prefix">ma-</span>
      <input class="field-input district-input" id="districtInput" type="text" placeholder="yourschool" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    </div>
  </div>
  <div class="field-group">
    <label class="field-label">Username</label>
    <input class="field-input" id="usernameInput" type="text" placeholder="student@school.org" autocomplete="username" autocorrect="off" autocapitalize="off" />
  </div>
  <div class="field-group">
    <label class="field-label">Password</label>
    <input class="field-input" id="passwordInput" type="password" placeholder="••••••••" autocomplete="current-password" />
  </div>
  <button class="btn-login" onclick="handleLogin()">Sign In</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="screen" id="loadingScreen">
  <div class="loader-ring"></div>
  <div class="loader-text">fetching grades...</div>
</div>

<div class="screen" id="gradesScreen">
  <div class="top-bar">
    <div class="top-bar-row">
      <div>
        <div class="greeting" id="greetingText">good morning</div>
        <div class="top-title">Your Grades</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="refresh-btn" onclick="handleRefresh()">↻</button>
        <button class="logout-btn" onclick="handleLogout()">logout</button>
      </div>
    </div>
  </div>
  <div class="gpa-card">
    <div class="gpa-number" id="gpaNumber">—</div>
    <div class="gpa-info">
      <div class="gpa-label">GPA (4.0 scale)</div>
      <div class="gpa-sub" id="gpaSub">— courses</div>
      <div class="gpa-bar-wrap"><div class="gpa-bar-fill" id="gpaBar"></div></div>
    </div>
  </div>
  <div class="section-label">Courses</div>
  <div class="courses-scroll" id="coursesList"></div>
</div>

<script>
  let savedCreds = null;
  const API_URL = '/api/grades';

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(id);
    void el.offsetWidth;
    el.classList.add('active');
  }

  function updateGreeting() {
    const h = new Date().getHours();
    document.getElementById('greetingText').textContent = h < 12 ? 'good morning' : h < 18 ? 'good afternoon' : 'good evening';
  }

  function gradeClass(letter) {
    if (!letter || letter === '—') return 'grade-NA';
    const l = letter[0];
    if (l === 'A') return 'grade-A';
    if (l === 'B') return 'grade-B';
    if (l === 'C') return 'grade-C';
    if (l === 'D') return 'grade-D';
    if (l === 'F') return 'grade-F';
    return 'grade-NA';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderGrades(data) {
    updateGreeting();
    const gpa = parseFloat(data.gpa);
    document.getElementById('gpaNumber').textContent = data.gpa || '—';
    document.getElementById('gpaSub').textContent = `${data.count} course${data.count !== 1 ? 's' : ''}`;
    setTimeout(() => {
      document.getElementById('gpaBar').style.width = `${Math.min((gpa / 4) * 100, 100)}%`;
    }, 100);

    const list = document.getElementById('coursesList');
    list.innerHTML = '';

    if (!data.courses || data.courses.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-text">No grades found.<br/>Grades may not be posted yet.</div></div>`;
      return;
    }

    data.courses.forEach((c, i) => {
      const card = document.createElement('div');
      card.className = 'course-card';
      card.style.animationDelay = `${i * 60}ms`;
      const letter = c.letter || '—';
      const pct = c.gradeNum !== null ? `${c.gradeNum}%` : (c.grade || '—');
      card.innerHTML = `
        <div class="grade-badge ${gradeClass(letter)}">${letter}</div>
        <div class="course-info">
          <div class="course-name">${escHtml(c.name)}</div>
          <div class="course-teacher">${escHtml(c.teacher || 'No teacher listed')}</div>
        </div>
        <div class="course-pct">${escHtml(pct)}</div>`;
      list.appendChild(card);
    });

    showScreen('gradesScreen');
  }

  async function fetchGrades(creds) {
    showScreen('loadingScreen');
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(creds),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Unknown error');
      renderGrades(data);
    } catch (err) {
      showScreen('loginScreen');
      document.getElementById('errorMsg').textContent = err.message || 'Connection failed';
    }
  }

  async function handleLogin() {
    const district = document.getElementById('districtInput').value.trim();
    const username = document.getElementById('usernameInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorEl = document.getElementById('errorMsg');
    errorEl.textContent = '';
    if (!district || !username || !password) { errorEl.textContent = 'All fields are required.'; return; }
    savedCreds = { district: `ma-${district}`, username, password };
    localStorage.setItem('gv_district', district);
    localStorage.setItem('gv_username', username);
    await fetchGrades(savedCreds);
  }

  function handleLogout() {
    savedCreds = null;
    document.getElementById('coursesList').innerHTML = '';
    document.getElementById('gpaNumber').textContent = '—';
    document.getElementById('gpaBar').style.width = '0%';
    document.getElementById('errorMsg').textContent = '';
    showScreen('loginScreen');
  }

  async function handleRefresh() {
    if (savedCreds) await fetchGrades(savedCreds);
  }

  window.addEventListener('load', () => {
    const d = localStorage.getItem('gv_district');
    const u = localStorage.getItem('gv_username');
    if (d) document.getElementById('districtInput').value = d;
    if (u) document.getElementById('usernameInput').value = u;
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
